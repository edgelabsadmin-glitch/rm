# fly.toml app configuration file generated for pulse-flows on 2026-05-21T05:22:30+05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pulse-flows'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  AP_EXECUTION_MODE = 'UNSANDBOXED'
  AP_FRONTEND_URL = 'https://pulse-flows.fly.dev'
  AP_POSTGRES_DATABASE = 'postgres'
  AP_POSTGRES_HOST = 'aws-1-ap-southeast-1.pooler.supabase.com'
  AP_POSTGRES_PORT = '6543'
  AP_POSTGRES_USE_SSL = 'true'
  AP_QUEUE_MODE = 'MEMORY'
  AP_TELEMETRY_ENABLED = 'false'

[[mounts]]
  source = 'ap_data'
  destination = '/root/.activepieces'

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
