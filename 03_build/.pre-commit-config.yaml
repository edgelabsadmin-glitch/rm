# SPEC-001 — pre-commit hooks. Run `pre-commit install` from 03_build/.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: pyright
        name: pyright
        # pre-commit runs hooks from the git root (ai-rm/), but the Python
        # project + its config + venv live in 03_build/. cd in and point pyright
        # at the project venv interpreter so imports resolve (matches CI, which
        # runs pyright with working-directory: 03_build).
        entry: bash -c 'cd 03_build && exec .venv/bin/pyright --pythonpath .venv/bin/python'
        language: system
        types: [python]
        pass_filenames: false
      - id: spec-id-commit-guard
        name: commit message references a spec id ([SPEC-NNN])
        # Enforces §4.13. Runs at commit-msg stage.
        # `--` makes the appended commit-msg filepath land in $1 (not $0):
        # `bash -c SCRIPT name [args]` assigns the first token to $0.
        entry: bash -c 'grep -Eq "\[SPEC-[0-9]{3}[a-z]?\]" "$1" || (echo "commit message must reference a spec id, e.g. [SPEC-012]"; exit 1)' --
        language: system
        stages: [commit-msg]
