# SPEC-001 — pre-commit hooks. Run `pre-commit install` from 03_build/.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: pyright
        language: system
        types: [python]
        pass_filenames: false
      - id: spec-id-commit-guard
        name: commit message references a spec id ([SPEC-NNN])
        # Enforces §4.13. Runs at commit-msg stage.
        entry: bash -c 'grep -Eq "\[SPEC-[0-9]{3}[a-z]?\]" "$1" || (echo "commit message must reference a spec id, e.g. [SPEC-012]"; exit 1)'
        language: system
        stages: [commit-msg]
