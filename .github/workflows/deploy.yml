name: Deploy Pulse

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPO: pulse-api
  APPRUNNER_SERVICE: pulse-api
  FRONTEND_BUCKET: pulse-frontend-prod-082178185739

jobs:
  # ── 1. Python unit tests ────────────────────────────────────────────────────
  test-api:
    name: API unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 03_build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -e ".[dev]"

      - name: Run unit tests (no DB)
        run: pytest tests/ -m "not db and not integration" -x -q

  # ── 2. Frontend tests + build ───────────────────────────────────────────────
  build-frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 03_build/front

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: 03_build/front/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: 03_build/front/dist/
          retention-days: 1

  # ── 3. Build & push API Docker image ───────────────────────────────────────
  build-api:
    name: Build & push API image
    runs-on: ubuntu-latest
    needs: [test-api]
    if: github.ref == 'refs/heads/main'
    outputs:
      image_uri: ${{ steps.push.outputs.image_uri }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, push
        id: push
        working-directory: 03_build
        run: |
          IMAGE_URI="${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO }}:${{ github.sha }}"
          LATEST_URI="${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO }}:latest"
          docker build -t "$IMAGE_URI" -t "$LATEST_URI" .
          docker push "$IMAGE_URI"
          docker push "$LATEST_URI"
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

  # ── 4. Deploy API to App Runner ─────────────────────────────────────────────
  deploy-api:
    name: Deploy API (App Runner)
    runs-on: ubuntu-latest
    needs: [build-api]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to App Runner
        run: |
          aws apprunner start-deployment \
            --service-arn "${{ secrets.APPRUNNER_SERVICE_ARN }}" \
            --region ${{ env.AWS_REGION }}
          echo "Deployment triggered for ${{ needs.build-api.outputs.image_uri }}"

  # ── 5. Deploy frontend to S3 + CloudFront ──────────────────────────────────
  deploy-frontend:
    name: Deploy frontend (S3 + CloudFront)
    runs-on: ubuntu-latest
    needs: [build-frontend, deploy-api]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Sync to S3
        run: |
          aws s3 sync dist/ s3://${{ env.FRONTEND_BUCKET }}/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp dist/index.html s3://${{ env.FRONTEND_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
