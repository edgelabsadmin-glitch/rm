name: pulse-ci

# SPEC-001 — CI smoke test: lint + type-check + tests on every push.
# The Spike 3 harness re-execution runs only when LLM secrets are present
# (it makes real Anthropic + OpenAI calls). Lint + unit/meta tests always run.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 03_build
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Format check (ruff)
        run: ruff format --check .
      - name: Type-check (pyright)
        run: pyright
      - name: Unit + meta tests
        run: pytest -q

  graphiti-harness:
    # End-to-end memory-layer check — gated on LLM secrets (real API calls).
    # Runs the SPEC-005 Three-Graph harness, which supersedes the Spike-3 harness:
    # it exercises the FTS bootstrap (via PulseKuzuDriver), typed entity/edge
    # extraction, namespace isolation, and bi-temporal queries in one pass.
    # NOTE: the `secrets` context is NOT available in a job-level `if:`, so we
    # surface the key as a job env var and gate each real-work step on it.
    # When the secret is unset the job runs but its steps no-op (still green).
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 03_build
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Pulse package (+ deps)
        if: env.ANTHROPIC_API_KEY != ''
        run: pip install -e .
      - name: Run SPEC-005 Three-Graph harness (typed extraction + FTS + bi-temporal + namespaces)
        if: env.ANTHROPIC_API_KEY != ''
        run: python scripts/harness_three_graph.py
