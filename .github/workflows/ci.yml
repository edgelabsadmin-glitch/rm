name: pulse-ci

# SPEC-001 — CI smoke test: lint + type-check + tests on every push.
# The Spike 3 harness re-execution runs only when LLM secrets are present
# (it makes real Anthropic + OpenAI calls). Lint + unit/meta tests always run.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 03_build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Format check (ruff)
        run: ruff format --check .
      - name: Type-check (pyright)
        run: pyright
      - name: Unit + meta tests
        run: pytest -q

  graphiti-harness:
    # Spike 3 harness re-execution — gated on LLM secrets (real API calls).
    # NOTE: the `secrets` context is NOT available in a job-level `if:`, so we
    # surface the key as a job env var and gate each real-work step on it.
    # When the secret is unset the job runs but its steps no-op (still green).
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install graphiti + harness deps
        if: env.ANTHROPIC_API_KEY != ''
        run: pip install "graphiti-core[kuzu,anthropic]>=0.29" openai python-dotenv
      - name: Run Spike 3 harness (FTS bootstrap regression)
        if: env.ANTHROPIC_API_KEY != ''
        run: python 00_research/spikes/03_graphiti/spike.py
